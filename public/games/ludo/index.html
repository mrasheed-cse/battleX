    <link rel="stylesheet" crossorigin href="/games/ludo/assets/index-BYklv1ux.css">
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; min-height: 100vh; overflow-x: hidden; background: #0a1628; }
      body { display: flex; flex-direction: column; align-items: center; justify-content: center; }
      #root { width: 100%; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow-x: hidden; }

  <body><div id="root"></div>
  <!--
    BattleX postMessage bridge v2.
    Intercepts the existing console.log('[LB] Game over - results posted by server:', body)
    that the Ludo game bundle already fires, and forwards it as a postMessage
    to LudoPlay.jsx so results can be saved to the leaderboard + BattleX API.
  -->
  <script>
  (function () {
    'use strict';

    var _sent = false;

    function notifyParent(payload) {
      if (_sent) return;
      _sent = true;
      try {
        window.parent.postMessage(payload, window.location.origin);
        console.__orig.call(console, '[LudoBridge] postMessage sent ✅', payload);
      } catch (e) {
        console.__orig.call(console, '[LudoBridge] postMessage failed:', e);
      }
    }

    // Intercept console.log to catch the existing game-over log
    console.__orig = console.log.bind(console);
    console.log = function () {
      // Pass through to real console first
      console.__orig.apply(console, arguments);

      // Look for the exact log the Ludo bundle fires on game over:
      // console.log("[LB] Game over - results posted by server:", body)
      try {
        var first = arguments[0];
        if (
          typeof first === 'string' &&
          first.indexOf('[LB] Game over') !== -1 &&
          arguments[1] &&
          typeof arguments[1] === 'object'
        ) {
          var body = arguments[1];

          // body = { matchId, totalPlayers, results: [...] }
          if (body.matchId && Array.isArray(body.results)) {
            notifyParent({
              type:         'LUDO_GAME_OVER',
              matchId:      body.matchId,
              results:      body.results,
              totalPlayers: body.totalPlayers || body.results.length,
              gameId:       null,
            });
          }
        }
      } catch (e) {
        // never crash the game
      }
    };

  })();
  </script>
  </body>
