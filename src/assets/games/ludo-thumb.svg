    <stop offset="0%" stop-color="#0d1b3e"/>
    <stop offset="100%" stop-color="#1a0a3e"/>
  </linearGradient>
  <linearGradient id="lredG" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#ff4455"/>
    <stop offset="100%" stop-color="#cc1122"/>
  </linearGradient>
  <linearGradient id="lblueG" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#2255ee"/>
    <stop offset="100%" stop-color="#1133bb"/>
  </linearGradient>
  <linearGradient id="lgreenG" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#22cc55"/>
    <stop offset="100%" stop-color="#118833"/>
  </linearGradient>
  <linearGradient id="lyellowG" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#ffcc00"/>
